<div class="card h-100 p-2">
    @if(image()){
        <div>
            <img [src]="image()" [alt]="titolo()" class="img-fluid w-100 object-fit-cover">
        </div>
    }
    <div class="card-body">
        <h5 class="card-title">{{ titolo() }}</h5>
        <p class="card-text">{{ descrizione() }}</p>
    </div>
</div>
