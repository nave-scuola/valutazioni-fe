<div class="container mt-4">

    <input type="text" class="form-control mb-3 border-2" placeholder="Cerca per studente" [value]="filtroTesto()" (input)="filtroTesto.set($any($event.target).value)" />
    <app-filtro-valutazioni (filtroApplicato)="onFiltro($event)"></app-filtro-valutazioni>


    @if (valutazioniFiltrate().length === 0) {
        <div class="alert alert-info text-center">
            Nessun elemento trovato.
        </div>
    } @else {
        <div class="row g-4">

       @for(item of valutazioniFiltrate(); track item.idValutazione) {
        <div class="col-12 col-sm-6 col-lg-3">
            <app-card [codiceStudente]="item.codiceStudente" [voto]="item.voto" [image]="'https://th.bing.com/th/id/OIP.3ZvnrEPm49k4OJ5UMN0tawHaEK?o=7rm=3&rs=1&pid=ImgDetMain&o=7&rm=3'" 
            (selezionato)="onCardClick(item)" />
        </div>
       } 
    </div>
    }
</div>
